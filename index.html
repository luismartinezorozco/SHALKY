    <!-- JavaScript to generate and download the .vcf file -->
    <script>
        function downloadVCard() {
            // vCard Data Construction
            const vcardData = `BEGIN:VCARD
VERSION:3.0
N:Recreación & Eventos;Shalky;;;
FN:Shalky Recreación & Eventos
ORG:Shalky Recreación & Eventos
TITLE:Servicios de Recreación
TEL;TYPE=WORK,VOICE,CELL:+573046717506
URL:https://wa.me/c/573046717506
URL:https://instagram.com/Shalky_recreacionyeventos
URL:https://tiktok.com/@shalkyrecreacionyeventos
NOTE:Servicios de recreación y eventos infantiles.\\nCatálogo: https://wa.me/c/573046717506\\nInstagram: @Shalky_recreacionyeventos\\nTikTok: @shalkyrecreacionyeventos\\nFacebook: Shalky Recreación y Eventos
END:VCARD`;

            // Create a Blob containing the vCard data
            const blob = new Blob([vcardData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            
            // Create a temporary anchor element to trigger download
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Shalky_Contacto.vcf');
            
            // Append to body, click, and remove
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Clean up the URL object
            window.URL.revokeObjectURL(url);
        }
